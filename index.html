<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Acupoints 3D — Learn the Meridians</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style-a.css">
</head>
<body>
  <main id="app">
    <div id="scene">
      <header id="titlebar">
        <h1>Acupoints&nbsp;3D</h1>
        <p>Drag to rotate · Scroll to zoom · Hover a meridian · Click a point</p>
        <p id="status"></p>
      </header>
      <aside id="legend">
        <ul id="legend-list"></ul>
      </aside>
      <div id="tooltip"></div>
    </div>
    <aside id="panel">
      <div id="panel-content">
      <div class="m-head"><h2></h2></div>
      <div class="layer-toggles" id="layer-toggles">
        <button class="layer-btn active" data-layer="body" title="Toggle body opacity">🦴</button>
        <button class="layer-btn active" data-layer="meridians" title="Toggle meridians">🌐</button>
        <button class="layer-btn active" data-layer="points" title="Toggle acupoints">📍</button>
      </div>      </div>
    </aside>
  </main>
  <script src="assets/three.min.js"></script>
  <script src="assets/GLTFLoader.js"></script>
  <script src="assets/model-data.js"></script>
  <script src="model-utils.js"></script>
  <script src="data.js"></script>
  <script src="meridian-colors.js"></script>
  <script src="main.js"></script>
</body>
</html>
